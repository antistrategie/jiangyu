version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    exclude-paths:
      - "vendor/**"
    ignore:
      # Vendor-only packages (used by AssetRipper under vendor/), kept as a
      # belt-and-braces defence because dependabot-core's NuGet updater
      # transitively follows ProjectReferences out of `directory:` / past
      # `exclude-paths`. Drop entries here as src/tests start using them.
      - dependency-name: "AsmResolver.*"
      - dependency-name: "AssetRipper.*"
      - dependency-name: "NAudio.*"
      - dependency-name: "NUnit*"
      - dependency-name: "Microsoft.CodeAnalysis.*"
      - dependency-name: "Microsoft.AspNetCore.OpenApi"
      - dependency-name: "Microsoft.OpenApi"
      - dependency-name: "Swashbuckle.AspNetCore"
      - dependency-name: "Ookii.CommandLine"
      - dependency-name: "Moq"
      - dependency-name: "PolySharp"
      - dependency-name: "SharpCompress"
      - dependency-name: "Fmod5Sharp"
      - dependency-name: "K4os.Compression.LZ4"
      - dependency-name: "ZstdSharp.Port"
      - dependency-name: "SourceGenerator.Foundations"
      - dependency-name: "oqo0.SwaggerThemes"
      # Pinned to 8.0.5 — net6.0 is the last version with a net6.0 target.
      # The Loader runs on MelonLoader's net6.0 runtime. Newer versions
      # pull in Microsoft.Bcl.AsyncInterfaces net10-only and break ILRepack.
      - dependency-name: "System.Text.Json"
      - dependency-name: "System.Text.Encodings.Web"
    groups:
      dotnet:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: bun
    directory: src/Jiangyu.Studio.UI
    schedule:
      interval: weekly
    groups:
      bun:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: bun
    directory: site
    schedule:
      interval: weekly
    groups:
      bun:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
