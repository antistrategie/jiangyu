name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The Loader project links against MelonLoader and game-side assemblies
      # via $(MelonLoaderDir)/$(GameAssembliesDir), which aren't available in
      # CI — so we run the two standalone test projects directly rather than
      # building the solution. Loader.Tests only depends on Jiangyu.Shared per
      # AGENTS.md (pure loader-side logic factored out of the IL2CPP project).
      #
      # TODO: figure out how to run all tests in CI. Options to explore:
      #   - commit lightweight reference-only stubs for MelonLoader/Il2CppInterop
      #     and the handful of referenced UnityEngine/Il2Cpp assemblies, pointed
      #     at by $(MelonLoaderDir)/$(GameAssembliesDir) for CI builds only
      #   - or fetch them in the workflow (MelonLoader has GitHub releases;
      #     UnityEngine modules may need more care re: licensing)
      #   - or factor more of the Loader into Jiangyu.Shared so there is less
      #     code behind the IL2CPP wall in the first place
      - name: Test Jiangyu.Core.Tests
        run: dotnet test tests/Jiangyu.Core.Tests/Jiangyu.Core.Tests.csproj

      - name: Test Jiangyu.Loader.Tests
        run: dotnet test tests/Jiangyu.Loader.Tests/Jiangyu.Loader.Tests.csproj

  studio-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Jiangyu.Studio.UI
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test
