  <body>
    <div id="root">
      <!-- Inline splash — shown until React mounts and replaces #root content -->
      <style>
        body {
          margin: 0;
        }
        @keyframes jy-spin {
          to {
            transform: rotate(360deg);
          }
        }
        .jy-splash {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100dvh;
          background: #ebe4d6;
          overflow: hidden;
        }
        .jy-splash img {
          width: 128px;
          height: 128px;
          object-fit: contain;
        }
        .jy-splash .jy-glyph {
          margin-top: 16px;
          font-size: 64px;
          font-weight: 700;
          line-height: 1.1;
          color: #1a1713;
        }
        .jy-splash .jy-sub {
          margin-top: 24px;
          font-size: 18px;
          font-weight: 300;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: #6e655a;
        }
        .jy-splash .jy-loading {
          margin-top: 20px;
          display: flex;
          align-items: center;
          gap: 8px;
          color: #6e655a;
          font-size: 14px;
          letter-spacing: 0.04em;
          text-transform: uppercase;
        }
        .jy-splash .jy-spinner {
          width: 14px;
          height: 14px;
          border: 2px solid #ddd3c0;
          border-top-color: #6e655a;
          border-radius: 50%;
          animation: jy-spin 0.8s linear infinite;
        }
      </style>
